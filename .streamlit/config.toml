# Configuración de Streamlit — Buscador de Inubicables

[theme]
base = "dark"
primaryColor = "#4a90d9"
backgroundColor = "#0f1419"
secondaryBackgroundColor = "#1a3a5c"
textColor = "#e5e7eb"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false
